name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number to release'
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    
    - name: Create a new pyproject.toml
      run: |
        cat <<EOF > pyproject.toml
        [tool.poetry]
        name = "dokulabs"
        version = "${{ github.event.inputs.version }}"
        description = "A Python library for tracking OpenAI API calls and sending usage metrics to Doku"
        authors = ["Doku Labs"]
        repository = "https://github.com/dokulabs/python-sdk"
        readme = "README.md"
        homepage = "https://github.com/dokulabs/python-sdk"
        keywords = ["openai", "anthropic", "claude", "cohere", "llm monitoring", "observability", "monitoring", "gpt"]

        [tool.poetry.dependencies]
        python = "^3.7.1"
        requests = "^2.26.0"

        [build-system]
        requires = ["poetry-core>=1.1.0"]
        build-backend = "poetry.core.masonry.api"
        EOF
    
    - name: Build package
      run: python -m build
    
    - name: Publish package
      uses: pypa/gh-action-pypi-publish@27b31702a0e7fc50959f5ad993c78deac1bdfc29
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "python-${{ github.event.inputs.version }}"
